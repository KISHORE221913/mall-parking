<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parking Slots</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        .legend {
            margin-bottom: 20px;
        }

        .legend span {
            display: inline-block;
            margin: 0 10px;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
        }

        .empty-box {
            background-color: green;
        }

        .occupied-box {
            background-color: red;
        }

        .floor {
            margin-bottom: 40px;
        }

        .floor h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .slot {
            width: 45px;
            height: 45px;
            display: inline-block;
            margin: 3px;
            text-align: center;
            line-height: 45px;
            font-size: 11px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .empty {
            background-color: green;
        }

        .occupied {
            background-color: red;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h2> Parking Slot View</h2>

    <!-- Legend -->
    <div class="legend">
        <span class="empty-box">Empty</span>
        <span class="occupied-box">Occupied</span>
    </div>

    <!-- Floors -->
    {% for floor, grid in floors.items %}
    <div class="floor">
        <h3>{{ floor }}</h3>

        {% for row in grid %}
            <div>
            {% for slot, status in row %}
                <div class="slot {{ status }}">
                    {{ slot }}
                </div>
            {% endfor %}
            </div>
        {% endfor %}
    </div>
    {% endfor %}

    <a href="/home/" class="btn">← Back to Home</a>
</div>

</body>
</html>
