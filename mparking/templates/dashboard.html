<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parking Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            width: 700px;
            margin: 50px auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .card {
            background-color: #007bff;
            color: white;
            padding: 15px;
            border-radius: 8px;
            width: 150px;
        }

        .card:nth-child(2) {
            background-color: #28a745;
        }

        .card:nth-child(3) {
            background-color: #ffc107;
            color: black;
        }

        canvas {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 15px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h2> Parking Dashboard</h2>

    <div class="stats">
        <div class="card">
            <h3>Cars</h3>
            <p>{{ car_count }}</p>
        </div>

        <div class="card">
            <h3>Bikes</h3>
            <p>{{ bike_count }}</p>
        </div>

        <div class="card">
            <h3>VIP</h3>
            <p>{{ vip_count }}</p>
        </div>
    </div>

    <canvas id="myChart" width="400" height="200"></canvas>

    <a href="/home/" class="btn">Back to Home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const car = Number("{{ car_count|default:0 }}");
const bike = Number("{{ bike_count|default:0 }}");
const vip = Number("{{ vip_count|default:0 }}");

const data = {
    labels: ['Cars', 'Bikes', 'VIP'],
    datasets: [{
        label: 'Vehicle Count',
        data: [car, bike, vip],
        borderWidth: 1
    }]
};

const config = {
    type: 'bar',
    data: data,
};

new Chart(document.getElementById('myChart'), config);
</script>

</body>
</html>
