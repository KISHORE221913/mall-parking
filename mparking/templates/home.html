<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mall Parking</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            width: 500px;
            margin: 80px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            display: block;
            width: 80%;
            margin: 10px auto;
            padding: 12px;
            text-decoration: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
        }

        .entry { background-color: #28a745; }
        .exit { background-color: #dc3545; }
        .slots { background-color: #17a2b8; }
        .dashboard { background-color: #6f42c1; }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container">
    <h1> Mall Parking System</h1>

    <a href="/entry/" class="btn entry"> Vehicle Entry</a>
    <a href="/exit/" class="btn exit"> Vehicle Exit</a>
    <a href="/slots/" class="btn slots"> View Parking Slots</a>
    <a href="/dashboard/" class="btn dashboard"> View Dashboard</a>
</div>

</body>
</html>
