<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parking Bill</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        p {
            font-size: 16px;
            margin: 10px 0;
        }

        .amount {
            font-size: 20px;
            font-weight: bold;
            color: green;
        }

        .btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2> Parking Bill</h2>

        <p><strong>Vehicle:</strong> {{ v.vehicle_number }}</p>
        <p><strong>Total Hours:</strong> {{ v.total_hours }}</p>
        <p class="amount">Amount to Pay: ₹{{ v.bill }}</p>

        <a href="/home/" class="btn">Back to Home</a>
    </div>

</body>
</html>
